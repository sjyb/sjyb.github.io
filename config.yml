baseURL: "https://sjyb.github.io/"
languageCode: "zh-cn"
title: "哥斯拉不说话"
theme: PaperMod

pagination:
  pagerSize: 4

params:
  defaultTheme: "dark"
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  disableSpecial1stPost: true
  # 目录(TOC)全局开关：true=所有文章默认显示右侧目录
  TableOfContents: true
  ShowToc: true
  # 首页主区块使用的 section（确保 / 与 /posts/ 一致）
  mainSections: ["posts"]

# 菜单：新版 PaperMod 标准写法（main 直接是数组，不套 params）
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archive
      name: 目录
      url: /archive/
      weight: 15
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20

taxonomies:
  tag: tags

markup:
  highlight:
    noClasses: false
    lineNos: false
