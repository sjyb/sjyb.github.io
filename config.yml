baseURL: "https://sjyb.github.io/"
languageCode: "zh-cn"
title: "哥斯拉不说话"
theme: PaperMod

params:
  defaultTheme: "dark"
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  disableSpecial1stPost: true

# 菜单：新版 PaperMod 标准写法（main 直接是数组，不套 params）
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20

taxonomies:
  tag: tags

markup:
  highlight:
    noClasses: false
    lineNos: false
